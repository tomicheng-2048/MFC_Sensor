<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFC 燃料電池監控面板</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 600px; }
        h1 { color: #333; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 15px; font-size: 1.8em; }
        
        /* 數據方塊區 */
        .data-wrapper { display: flex; flex-direction: column; gap: 20px; }
        .data-block { padding: 20px; border-radius: 12px; background: #fafafa; border-left: 6px solid #ccc; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .label { font-size: 1.1em; color: #666; font-weight: 500; }
        .value { font-size: 2em; font-weight: bold; font-family: 'Courier New', Courier, monospace; }
        
        /* 顏色區分 */
        .v-block { border-left-color: #4caf50; } 
        .c-block { border-left-color: #2196f3; } 
        .n-block { border-left-color: #9c27b0; } /* 氮濃度改用紫色 */
        
        .v-val { color: #4caf50; }
        .c-val { color: #2196f3; }
        .n-val { color: #9c27b0; }
        
        /* 狀態資訊 */
        .info-footer { margin-top: 25px; display: flex; justify-content: space-between; color: #888; font-size: 0.9em; }
        .status-dot { width: 10px; height: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-active .status-dot { background-color: #2196f3; box-shadow: 0 0 5px #2196f3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MFC 燃料電池監控面板</h1>
        
        <div class="data-wrapper">
            <div class="data-block v-block">
                <span class="label">電壓 (Voltage)</span>
                <span class="value v-val" id="v-val">6.50 mV</span>
            </div>
            
            <div class="data-block c-block">
                <span class="label">電流 (Current)</span>
                <span class="value c-val" id="c-val">17.30 mA</span>
            </div>
            
            <div class="data-block n-block">
                <span class="label">氮濃度 (Nitrogen)</span>
                <span class="value n-val" id="n-val">21.4 mmol/L</span>
            </div>
        </div>

        <div class="info-footer">
            <div id="status-light"><span class="status-dot"></span><span id="status-text">系統運作中</span></div>
            <div id="time">更新中...</div>
        </div>
    </div>

    <script>
        // 設定基準值
        const targetVoltage = 6.5;
        const targetCurrent = 17.3;
        const targetNitrogen = 21.4;

        function updateMonitor() {
            // 模擬微小的數據浮動 (讓畫面看起來像活的)
            let v = targetVoltage + (Math.random() - 0.5) * 0.1;
            let c = targetCurrent + (Math.random() - 0.5) * 0.05;
            let n = targetNitrogen + (Math.random() - 0.5) * 0.02;

            // 更新到網頁上
            document.getElementById('v-val').innerText = v.toFixed(2) + " mV";
            document.getElementById('c-val').innerText = c.toFixed(2) + " mA";
            document.getElementById('n-val').innerText = n.toFixed(1) + " mmol/L";
            
            // 更新時間
            let now = new Date();
            document.getElementById('time').innerText = "最後更新: " + now.toLocaleTimeString();

            // 閃爍狀態燈
            const statusLight = document.getElementById('status-light');
            statusLight.classList.add('status-active');
            setTimeout(() => statusLight.classList.remove('status-active'), 150);
        }

        // 每秒更新兩次數據
        setInterval(updateMonitor, 500);
        updateMonitor(); // 初始化執行一次
    </script>
</body>
</html>
