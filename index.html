<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MFC 即時監控儀表板</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .card { background: #333; display: inline-block; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 50px; }
        .value { font-size: 60px; font-weight: bold; margin: 10px 0; }
        .voltage { color: #ff4757; }
        .current { color: #2ed573; }
        .status { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>MFC 實驗室數據</h1>
        <hr>
        <div>電壓 (Voltage)</div>
        <div id="v-val" class="value voltage">0.00 V</div>
        <div>電流 (Current)</div>
        <div id="c-val" class="value current">0.00 mA</div>
        <div id="time" class="status">等待更新...</div>
    </div>

    <script>
        const apiURL = "https://script.google.com/macros/s/AKfycbyH8QQ8MNk16TQCVmfy46z78RJxaZohyJAQLgrBjY_9kPwrJQ0bx6pJLL--9q-93ttf/exec"; // 貼上剛才得到的網址

        async function fetchData() {
            try {
                const response = await fetch(apiURL);
                const data = await response.json();
                document.getElementById('v-val').innerText = data.v.toFixed(3) + " V";
                document.getElementById('c-val').innerText = data.c.toFixed(2) + " mA";
                document.getElementById('time').innerText = "最後更新: " + new Date(data.time).toLocaleTimeString();
            } catch (e) {
                console.log("更新失敗");
            }
        }

        setInterval(fetchData, 5000); // 每 5 秒自動抓一次
        fetchData(); // 網頁開啟立刻抓一次
    </script>
</body>
</html>
